<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<script>
(function() {
  var raw = localStorage.getItem('theme');
  var theme = raw;
  try {
    var parsed = JSON.parse(raw);
    if (parsed && parsed.value) theme = parsed.value;
  } catch(e) {}
  
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

  #header .left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header .title {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-primary);
  }
  #header .title span { color: var(--text-secondary); }
  #header .sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 4px;
    font-weight: 400;

    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;

  .back-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);

    gap: 4px;
    flex-wrap: wrap;
  }
  .era-tabs .btn {
    padding: 4px 13px;
    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .era-tabs .btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }
  .era-tabs .btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--bg-card);
  }
  [data-theme="dark"] .era-tabs .btn.active {
    background: #cfc8c0;
    border-color: #cfc8c0;
    color: #181614;
  }

  .reset-btn {
    padding: 4px 12px;
    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .reset-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ========== 主布局 ========== */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

    flex: 1;
    position: relative;
    background: var(--bg-main);
    min-height: 0;
    transition: background 0.3s;
  }
  #graph-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  #graph-wrap svg:active { cursor: grabbing; }

    display: flex;

    margin-top: 40px;

    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.3px;

  #panel .name .tag {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);

  #panel .age {
    font-size: 13px;
    color: var(--text-secondary);

    color: var(--text-secondary);

    transition: background 0.3s;

  #panel .story {

  #panel .relations {
    margin-top: 12px;
    border-top: 1px solid var(--border-light);
    padding-top: 12px;
    transition: border-color 0.3s;

  #panel .relations .label {
    font-size: 10px;
    color: var(--text-muted);

    height: 5px;
    border-radius: 50%;

  .link-line {

  stroke: #c44536 !important;
  stroke-width: 2.5px !important;
  stroke-dasharray: 6,4 !important;
  opacity: 0.9 !important;
  }

    stroke: var(--link-pink);
    stroke-width: 1.8px;
    opacity: 0.6;
  }
  .link-label-bg {

    stroke: var(--border-light);
    stroke-width: 0.5;

    font-size: 10px;
    fill: var(--text-secondary);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    font-weight: 400;
    letter-spacing: 0.2px;

  .node-group { cursor: pointer; }
  .node-ring {
    fill: none;
    stroke-width: 3.5px;
    opacity: var(--ring-opacity);
    transition: opacity 0.3s, stroke-width 0.3s;
  }
  .node-circle {
    stroke: var(--node-stroke);
    stroke-width: 2px;
    filter: drop-shadow(0 2px 8px var(--shadow));
    transition: filter 0.3s, stroke 0.3s;
  }
  .node-letter {
    font-size: 16px;
    font-weight: 600;
    fill: #ffffff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    letter-spacing: 0.3px;
  }
  .node-name {
    font-size: 12px;
    font-weight: 500;
    fill: var(--text-primary);
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.2px;

    font-weight: 700;
    fill: var(--main-color);
  }
  .node-role {
    font-size: 10px;
    fill: var(--text-secondary);
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.2px;
    transition: fill 0.3s;
  }
  .node-tag-bg {
    rx: 10;
    opacity: var(--tag-opacity);
    transition: opacity 0.3s;
  }
  .node-tag-text {
    font-size: 9px;
    fill: #ffffff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .node.selected .node-ring {
    opacity: var(--ring-selected);
    stroke-width: 5px;
  }

  @media (max-width: 820px) {

    #header .sub { display: none; }
    .era-tabs .btn { font-size: 11px; padding: 3px 11px; }
  }
  @media (max-width: 500px) {

    #header .left { gap: 8px; }

</style>

<script>
  // ================================================================
  //  读取 localStorage 的夜间模式设置
  // ================================================================
  (function() {
    try {
      var raw = localStorage.getItem('theme');
      var theme = raw;
      try {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.value) theme = parsed.value;
      } catch(e) {}
      
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (theme === 'light') {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch(e) {}
  })();
</script>

      story: '魂魄与浮生树母体融合，转世两百年后重回地府。从末席一路升至第四席。温柔迟钝，却是串联一切因果的枢纽。'
    },
    {

      era: 'all',

    },
    {

      tag: '主要配角',
      color: COLORS.lcy,
      age: '约300岁',
      identity: '顾执的情劫对象 · 罗修的仇敌',
      era: 'all',
      story: '前身是景枭，顾执为他而死之后才逐渐后悔。一直守在顾执骨血长出的桃林里，不肯离去。'
    },
    {
      id: 'wyj',
      name: '魏元璟',
      role: '归终殿第五席',
      tag: '主要配角',
      color: COLORS.wyj,
      age: '重铸后约30岁',
      identity: '前朝末帝 · 重铸魂魄',
      era: 'present',
      story: '从帝王到引渡人，从念安到魏元璟。在罗修身边重新学会了"普通地幸福"。'
    },
    {
      id: 'cms',
      name: '程木栖',
      role: '栖梧馆医者',
      tag: '亲友',
      color: COLORS.cms,
      age: '约400岁',
      identity: '前第三席 · 古琴医者',
      era: 'present',
      story: '京城决战后双手重伤，退居二线开设医馆。那双弹琴的手如今只用来为同门熬药。'
    },
    {
      id: 'rs',
      name: '冉舟',
      role: '前归终殿第九席',
      tag: '家族线',
      color: COLORS.rs,
      age: '约150岁（人偶）',
      identity: '人偶 · 秦雨令的影子',
      era: 'present',
      story: '她是被制造出来的替代品，却也是唯一一个在月光下为栾方棋舞过剑的"姐姐"。最后那一剑，刺穿了他的心，也刺穿了她自己的命运。'
    },
    {
      id: 'lcl',
      name: '黎洛兰',
      role: '五殿郡主',
      tag: '亲友',
      color: COLORS.lcl,
      age: '约300岁',
      identity: '摧城笛的吹奏者',
      era: 'present',
      story: '在地府吹了两百年的笛子，最后被白禾川碎魂。留给栾方棋的最后一句话是"小心狐狸"。'
    },
    {
      id: 'ljs',
      name: '李锦书',
      role: '人偶师 · 浮生一粟第三代主人',
      tag: '主要配角',
      color: COLORS.ljs,
      age: '约200岁',
      identity: '人偶师 · 观花卷持有者',
      era: 'present',
      story: '浮生一粟第三代主人，被白禾川威胁制造人偶。造出了冉舟（秦雨令的替身），也指引栾方棋寻找断魂剑。最终被白禾川所杀。'
    }
  ];

  // ================================================================
  //  关系数据（爱人关系用 red: true → 渲染为红色虚线）
  // ================================================================
  const ALL_LINKS = [
    // === 秦墨予时期 ===
    { source: 'qmy', target: 'lh', relation: '浮生之契 · 爱人', red: true },
    { source: 'qmy', target: 'lcj', relation: '君臣 · 债' },
    { source: 'qmy', target: 'qyl', relation: '姐弟 · 血缘' },
    { source: 'qmy', target: 'syj', relation: '间接因果' },
    { source: 'qmy', target: 'cc', relation: '养父子 · 取名之恩' },
    { source: 'cc', target: 'lcy', relation: '救命之恩 · 担保' },
    { source: 'lcy', target: 'lx', relation: '情敌 · 仇敌' },
    { source: 'lcy', target: 'gz', relation: '情劫 · 因果', pink: true },
    { source: 'gz', target: 'syj', relation: '造物主 · 情劫之替' },
    { source: 'syj', target: 'sj', relation: '同僚 · 罪与罚' },
    { source: 'sj', target: 'bhe', relation: '青丘毁灭者 · 仇' },
    { source: 'sj', target: 'qyl', relation: '真身 · 化身' },
    { source: 'qyl', target: 'bhe', relation: '执念 · 因果' },
    { source: 'qyl', target: 'by', relation: '义姐妹 · 收养' },
    { source: 'bhe', target: 'by', relation: '封印 · 杀身之仇' },

    // === 栾方棋时期 ===
    { source: 'lfq', target: 'lh', relation: '浮生之契 · 爱人', red: true },
    { source: 'lfq', target: 'lx', relation: '师兄 · 被骂着长大' },
    { source: 'lfq', target: 'wyj', relation: '酒友 · 倾听者' },
    { source: 'lfq', target: 'cms', relation: '师姐 · 医患' },
    { source: 'lfq', target: 'rs', relation: '前世的姐姐 · 债' },
    { source: 'lfq', target: 'bhe', relation: '仇敌 · 因果之源' },
    { source: 'lfq', target: 'lcl', relation: '最后一面 · 警语' },
    { source: 'lx', target: 'wyj', relation: '爱人 · 破例者', red: true },
    { source: 'bhe', target: 'sj', relation: '被审判者 · 终局' },
    { source: 'gz', target: 'wyj', relation: '命格融合 · 共生' },
    { source: 'lx', target: 'gz', relation: '爱过 · 执念' },

    // === 李锦书 ===
    { source: 'bhe', target: 'ljs', relation: '胁迫 · 为虎作伥' },
    { source: 'ljs', target: 'rs', relation: '造物主 · 人偶师' },
    { source: 'rs', target: 'bhe', relation: '棋子 · 被利用' },

    // === 黎洛兰 ===
    { source: 'bhe', target: 'lcl', relation: '威胁 · 碎魂' }
  ];

  // ================================================================
  //  D3 力导向图引擎
  // ================================================================
  let currentEra = 'past';
  let nodes = [];
  let links = [];
  let selectedNode = null;

  const container = document.getElementById('graph-wrap');
  const svg = d3.select('#chart');
  let width = container.clientWidth;
  let height = container.clientHeight || 600;

  svg.attr('viewBox', [-width / 2, -height / 2, width, height]);

  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.2, 3.5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  const simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(200))
    .force('charge', d3.forceManyBody().strength(-700))
    .force('center', d3.forceCenter(0, 0))
    .force('collide', d3.forceCollide().radius(44))
    .velocityDecay(0.35);

  let linkGroup = g.append('g').attr('class', 'links');
  let nodeGroup = g.append('g').attr('class', 'nodes');

  // ================================================================
  //  过滤 & 渲染
  // ================================================================
  function filterData(era) {
    const oldPos = {};
    nodes.forEach(n => { if (n.x !== undefined) oldPos[n.id] = { x: n.x, y: n.y }; });

    const filtered = ALL_NODES.filter(n => n.era === era || n.era === 'all');
    filtered.forEach(n => {
      if (oldPos[n.id]) {
        n.x = oldPos[n.id].x;
        n.y = oldPos[n.id].y;
      } else {
        const angle = Math.random() * 2 * Math.PI;
        const r = 60 + Math.random() * 120;
        n.x = Math.cos(angle) * r;
        n.y = Math.sin(angle) * r;
      }
      n.fx = null;
      n.fy = null;
    });

    const ids = new Set(filtered.map(n => n.id));
    const flinks = ALL_LINKS
      .filter(l => ids.has(l.source) && ids.has(l.target))
      .map(l => {
        const s = filtered.find(n => n.id === l.source);
        const t = filtered.find(n => n.id === l.target);
        if (!s || !t) return null;
        return {
          source: s,
          target: t,
          relation: l.relation,
          red: l.red || false,
          pink: l.pink || false
        };
      })
      .filter(l => l !== null);

    return { nodes: filtered, links: flinks };
  }

  function render(era) {
    const data = filterData(era);
    nodes = data.nodes;
    links = data.links;

    if (selectedNode && !nodes.find(n => n.id === selectedNode.id)) {
      selectedNode = null;
      showEmpty();
      d3.selectAll('.node-group').classed('selected', false);
    }

    // —— 连线 ——
    const linkSel = linkGroup.selectAll('.link-item')
      .data(links, d => d.source.id + '-' + d.target.id);
    linkSel.exit().transition().duration(250).style('opacity', 0).remove();

    const linkEnter = linkSel.enter().append('g')
      .attr('class', 'link-item')
      .style('opacity', 0);
    linkEnter.transition().duration(300).style('opacity', 1);

    linkEnter.append('line')
      .attr('class', 'link-line')
      .attr('stroke', d => d.red ? 'var(--link-red)' : (d.pink ? 'var(--link-pink)' : 'var(--link-line)'))
      .attr('stroke-dasharray', d => d.red ? '6,4' : (d.pink ? '' : '4,4'))
      .attr('stroke-width', d => d.red ? 2.2 : (d.pink ? 1.8 : 1.5));

    linkEnter.append('rect')
      .attr('class', 'link-label-bg')
      .attr('width', 60).attr('height', 18).attr('x', -30).attr('y', -9);

    linkEnter.append('text')
      .attr('class', 'link-label-text')
      .attr('dy', 1);

    // —— 节点 ——
    const nodeSel = nodeGroup.selectAll('.node-group')
      .data(nodes, d => d.id);
    nodeSel.exit().transition().duration(250).style('opacity', 0).remove();

    const nodeEnter = nodeSel.enter().append('g')
      .attr('class', 'node-group')
      .style('opacity', 0)
      .call(d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended))
      .on('click', function(e, d) {
        e.stopPropagation();
        selectNode(d);
        nodes.forEach(n => {
          if (n !== d) {
            n.vx = (Math.random() - 0.5) * 4;
            n.vy = (Math.random() - 0.5) * 4;
          }
        });
        simulation.alpha(0.8).restart();
      });

    nodeEnter.transition().duration(350).style('opacity', 1);

    nodeEnter.append('circle').attr('class', 'node-ring').attr('r', 38);
    nodeEnter.append('circle').attr('class', 'node-circle').attr('r', 28);
    nodeEnter.append('text').attr('class', 'node-letter').attr('dy', 1)
      .text(d => d.name ? d.name.charAt(0) : '?');

    const tagW = 44;
    nodeEnter.append('rect')
      .attr('class', 'node-tag-bg')
      .attr('y', -46).attr('height', 16).attr('width', tagW).attr('x', -tagW / 2);
    nodeEnter.append('text').attr('class', 'node-tag-text').attr('y', -38);

    nodeEnter.append('text')
      .attr('class', 'node-name')
      .attr('y', 44)
      .text(d => d.name);

    nodeEnter.append('text')
      .attr('class', 'node-role')
      .attr('y', 58);

    svg.on('click', () => {
      selectedNode = null;
      showEmpty();
      d3.selectAll('.node-group').classed('selected', false);
    });

    refreshVisuals();

    nodes.forEach(d => { d.fx = null; d.fy = null; });
    simulation.nodes(nodes);
    simulation.force('link').links(links);
    simulation.alpha(1).restart();
  }

  function refreshVisuals() {
    const all = nodeGroup.selectAll('.node-group');

    all.select('.node-ring')
      .attr('stroke', d => d.color || '#c4bdb5');

    all.select('.node-circle')
      .attr('fill', d => d.color || '#c4bdb5');

    all.select('.node-letter')
      .text(d => d.name ? d.name.charAt(0) : '?');

    all.select('.node-tag-bg')
      .attr('fill', d => d.color || '#c4bdb5')
      .attr('width', d => Math.max(34, ((d.tag || '角色').length * 10 + 12)))
      .attr('x', d => -Math.max(34, ((d.tag || '角色').length * 10 + 12)) / 2);

    all.select('.node-tag-text')
      .text(d => d.tag || '角色');

    all.select('.node-name')
      .text(d => d.name)
      .attr('class', d => d.isMain ? 'node-name main' : 'node-name');

    all.select('.node-role')
      .text(d => (d.role || '').length > 16 ? d.role.slice(0, 14) + '…' : (d.role || ''));
  }

  // ================================================================
  //  物理 tick
  // ================================================================
  simulation.on('tick', () => {
    linkGroup.selectAll('.link-item').each(function(d) {
      const line = d3.select(this).select('line');
      const rect = d3.select(this).select('rect');
      const text = d3.select(this).select('text');
      const x1 = d.source.x, y1 = d.source.y;
      const x2 = d.target.x, y2 = d.target.y;
      line.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const txt = d.relation || '关系';
      const tw = Math.max(40, txt.length * 11 + 14);
      rect.attr('x', mx - tw / 2).attr('y', my - 9).attr('width', tw);
      text.attr('x', mx).attr('y', my).text(txt);
    });
    nodeGroup.selectAll('.node-group')
      .attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ================================================================
  //  拖拽
  // ================================================================
  function dragstarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(e, d) {
    d.fx = e.x; d.fy = e.y;
  }
  function dragended(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = d.x; d.fy = d.y;
  }

  // ================================================================
  //  交互
  // ================================================================
  function switchEra(era) {
    currentEra = era;
    document.querySelectorAll('#eraTabs .btn').forEach(b => {
      b.classList.toggle('active', b.dataset.era === era);
    });
    render(era);
  }

  document.querySelectorAll('#eraTabs .btn').forEach(btn => {
    btn.addEventListener('click', () => switchEra(btn.dataset.era));
  });

  function selectNode(d) {
    selectedNode = d;
    d3.selectAll('.node-group').classed('selected', false);
    d3.selectAll('.node-group').filter(n => n === d).classed('selected', true);

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('detail').style.display = 'block';

    document.getElementById('dName').textContent = d.name;
    document.getElementById('dAge').textContent = '年龄：' + (d.age || '未知');
    document.getElementById('dRole').textContent = d.role || '身份未明';
    document.getElementById('dEra').textContent = '📌 ' + (d.era === 'past' ? '秦墨予时期' : '栾方棋时期');

    document.getElementById('dStory').textContent = d.story || '暂无背景记载。';

    const rels = ALL_LINKS.filter(l => l.source === d.id || l.target === d.id);
    const rc = document.getElementById('dRels');
    if (rels.length === 0) {
      rc.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">暂无关联</div>';
    } else {
      rc.innerHTML = rels.map(l => {
        const other = l.source === d.id ? l.target : l.source;
        const node = ALL_NODES.find(n => n.id === other);
        const color = node ? node.color : '#c4bdb5';
        return `<div class="item"><span class="dot" style="background:${color};"></span> ${other} · ${l.relation}</div>`;
      }).join('');
    }
  }

  function showEmpty() {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }

  function resetZoom() {
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    nodes.forEach(n => {
      n.vx = (Math.random() - 0.5) * 3;
      n.vy = (Math.random() - 0.5) * 3;
    });
    simulation.alpha(0.6).restart();
  }
  window.resetZoom = resetZoom;

  // ================================================================
  //  响应式
  // ================================================================
  function resize() {
    width = container.clientWidth;
    height = container.clientHeight || 600;
    svg.attr('viewBox', [-width / 2, -height / 2, width, height]);
    simulation.force('center', d3.forceCenter(0, 0));
    simulation.alpha(0.3).restart();
  }
  window.addEventListener('resize', resize);
  new ResizeObserver(resize).observe(container);

  // ================================================================
  //  启动
  // ================================================================
  render('past');

  setTimeout(() => {
    const node = ALL_NODES.find(n => n.id === 'qmy');
    if (node) selectNode(node);
  }, 500);

  console.log('📜 墨境人物星图 · 小清新模板已加载');
</script>
</body>
</html>
