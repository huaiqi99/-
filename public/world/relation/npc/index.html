<style>
  /* ========== CSS 变量（浅色默认） ========== */
  :root {
    --bg-main: #f7f4ef;
    --bg-card: #ffffff;
    --bg-toolbar: #ffffff;
    --border-light: #ece6de;
    --text-primary: #3a3a3a;
    --text-secondary: #8a8a8a;
    --text-muted: #b8b8b8;
    --shadow: rgba(0,0,0,0.04);
    --link-line: #d5cec6;
    --link-red: #c9a8a0;
    --link-pink: #d4b8b8;
    --label-bg: rgba(255,255,255,0.88);
    --node-shadow: rgba(0,0,0,0.06);
    --node-stroke: #ffffff;
    --ring-opacity: 0.15;
    --ring-selected: 0.35;
    --tag-opacity: 0.85;
    --scrollbar: #e8e2da;
  }

  /* ========== 深色模式 ========== */
  [data-theme="dark"] {
    --bg-main: #181614;
    --bg-card: #24201c;
    --bg-toolbar: #1e1b18;
    --border-light: #35302a;
    --text-primary: #cfc8c0;
    --text-secondary: #8a847c;
    --text-muted: #5a5550;
    --shadow: rgba(0,0,0,0.3);
    --link-line: #4a4540;
    --link-red: #b08a80;
    --link-pink: #9a7a7a;
    --label-bg: rgba(36,32,28,0.92);
    --node-shadow: rgba(0,0,0,0.25);
    --node-stroke: #2a2622;
    --ring-opacity: 0.25;
    --ring-selected: 0.5;
    --tag-opacity: 0.9;
    --scrollbar: #3a3530;
  }

  /* ========== 全局 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  /* ========== 顶栏 ========== */
  #header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-light);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 10px;
    transition: background 0.3s, border-color 0.3s;
  }
  #header .left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header .title {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-primary);
  }
  #header .title span { color: var(--text-secondary); }
  #header .sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 4px;
    font-weight: 400;
  }
  .back-btn {
    padding: 4px 14px;
    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .back-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ========== 国家切换按钮 ========== */
  .country-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .country-tabs .btn {
    padding: 4px 13px;
    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .country-tabs .btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }
  .country-tabs .btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--bg-card);
  }
  [data-theme="dark"] .country-tabs .btn.active {
    background: #cfc8c0;
    border-color: #cfc8c0;
    color: #181614;
  }

  .reset-btn {
    padding: 4px 12px;
    border-radius: 18px;
    border: 1px solid var(--border-light);
    background: transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .reset-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ========== 主布局 ========== */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ========== 图区域 ========== */
  #graph-wrap {
    flex: 1;
    position: relative;
    background: var(--bg-main);
    min-height: 0;
    transition: background 0.3s;
  }
  #graph-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  #graph-wrap svg:active { cursor: grabbing; }

  /* ========== 右侧面板 ========== */
  #panel {
    width: 300px;
    background: var(--bg-card);
    border-left: 1px solid var(--border-light);
    padding: 22px 20px;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
  }
  #panel .empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 40px;
    line-height: 1.9;
  }
  #panel .empty i { font-size: 28px; display: block; margin-bottom: 10px; opacity: 0.5; }
  #panel .name {
    font-size: 21px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.3px;
  }
  #panel .name .tag {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 6px;
  }
  #panel .role {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 2px 0 8px 0;
  }
  #panel .country-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 12px;
    border-radius: 12px;
    background: var(--bg-main);
    color: var(--text-secondary);
    margin-bottom: 12px;
    transition: background 0.3s;
  }
  #panel .story {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-primary);
    border-top: 1px solid var(--border-light);
    padding-top: 12px;
    margin-top: 2px;
    transition: border-color 0.3s;
  }
  #panel .story .label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  #panel .relations {
    margin-top: 12px;
    border-top: 1px solid var(--border-light);
    padding-top: 12px;
    transition: border-color 0.3s;
  }
  #panel .relations .label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  #panel .relations .item {
    font-size: 12px;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
  }
  #panel .relations .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ========== SVG 连线样式 ========== */
  .link-line {
    stroke: var(--link-line);
    stroke-width: 1.5px;
    opacity: 0.5;
  }
  .link-line.red {
    stroke: var(--link-red);
    stroke-width: 2.2px;
    opacity: 0.75;
  }
  .link-line.pink {
    stroke: var(--link-pink);
    stroke-width: 1.8px;
    opacity: 0.6;
  }
  .link-label-bg {
    fill: var(--label-bg);
    stroke: var(--border-light);
    stroke-width: 0.5;
    rx: 4;
    transition: fill 0.3s, stroke 0.3s;
  }
  .link-label-text {
    font-size: 10px;
    fill: var(--text-secondary);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  /* ========== SVG 节点样式 ========== */
  .node-group { cursor: pointer; }
  .node-ring {
    fill: none;
    stroke-width: 3.5px;
    opacity: var(--ring-opacity);
    transition: opacity 0.3s, stroke-width 0.3s;
  }
  .node-circle {
    stroke: var(--node-stroke);
    stroke-width: 2px;
    filter: drop-shadow(0 2px 8px var(--shadow));
    transition: filter 0.3s, stroke 0.3s;
  }
  .node-letter {
    font-size: 16px;
    font-weight: 600;
    fill: #ffffff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    letter-spacing: 0.3px;
  }
  .node-name {
    font-size: 12px;
    font-weight: 500;
    fill: var(--text-primary);
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.2px;
    transition: fill 0.3s;
  }
  .node-name.main {
    font-weight: 700;
  }
  .node-role {
    font-size: 10px;
    fill: var(--text-secondary);
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.2px;
    transition: fill 0.3s;
  }
  .node-tag-bg {
    rx: 10;
    opacity: var(--tag-opacity);
    transition: opacity 0.3s;
  }
  .node-tag-text {
    font-size: 9px;
    fill: #ffffff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .node.selected .node-ring {
    opacity: var(--ring-selected);
    stroke-width: 5px;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 820px) {
    #main { flex-direction: column; }
    #panel {
      width: 100%;
      max-height: 38vh;
      border-left: none;
      border-top: 1px solid var(--border-light);
    }
    #header { padding: 10px 16px; }
    #header .title { font-size: 17px; }
    #header .sub { display: none; }
    .country-tabs .btn { font-size: 11px; padding: 3px 11px; }
  }
  @media (max-width: 500px) {
    #panel { padding: 16px; }
    #header .left { gap: 8px; }
    .back-btn { font-size: 11px; padding: 3px 10px; }
  }
</style>

<script>
  // ================================================================
  //  读取 Butterfly 主题的夜间模式设置
  // ================================================================
  (function() {
    try {
      const raw = localStorage.getItem('theme');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.value === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (parsed && parsed.value === 'light') {
          document.documentElement.removeAttribute('data-theme');
        }
      }
    } catch(e) {}
  })();
</script>

  // ================================================================
  //  D3 力导向图引擎 —— 动态增强版
  // ================================================================
  let currentCountry = '业焰之国';
  let nodes = [];
  let links = [];
  let selectedNode = null;

  const container = document.getElementById('graph-wrap');
  const svg = d3.select('#chart');
  let width = container.clientWidth;
  let height = container.clientHeight || 600;

  svg.attr('viewBox', [-width / 2, -height / 2, width, height]);

  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.2, 3.5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  // ====== 动态参数：线长 250，低阻尼 0.3，让节点滑得更远 ======
  const simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(250))
    .force('charge', d3.forceManyBody().strength(-900
    ))
    .force('center', d3.forceCenter(0, 0))
    .force('collide', d3.forceCollide().radius(38))
    .velocityDecay(0.3);   // ← 低阻尼，散花效果明显

  let linkGroup = g.append('g').attr('class', 'links');
  let nodeGroup = g.append('g').attr('class', 'nodes');

  // ================================================================
  //  过滤 & 渲染（保留位置 + 高 alpha 重启）
  // ================================================================
  function filterData(country) {
    const oldPos = {};
    nodes.forEach(n => { if (n.x !== undefined) oldPos[n.id] = { x: n.x, y: n.y }; });

    const filtered = ALL_NODES.filter(n => n.country === country);
    filtered.forEach(n => {
      if (oldPos[n.id]) {
        n.x = oldPos[n.id].x;
        n.y = oldPos[n.id].y;
      } else {
        // 新节点从中心附近随机偏移，形成散花起点
        const angle = Math.random() * 2 * Math.PI;
        const r = 40 + Math.random() * 100;
        n.x = Math.cos(angle) * r;
        n.y = Math.sin(angle) * r;
      }
      n.fx = null;
      n.fy = null;
    });

    const ids = new Set(filtered.map(n => n.id));
    const flinks = ALL_LINKS
      .filter(l => ids.has(l.source) && ids.has(l.target))
      .map(l => {
        const s = filtered.find(n => n.id === l.source);
        const t = filtered.find(n => n.id === l.target);
        if (!s || !t) return null;
        return {
          source: s,
          target: t,
          relation: l.relation,
          red: l.red || false,
          pink: l.pink || false
        };
      })
      .filter(l => l !== null);

    return { nodes: filtered, links: flinks };
  }

  // ================================================================
  //  渲染（含点击弹射）
  // ================================================================
  function render(country, isInit = false) {
    const data = filterData(country);
    nodes = data.nodes;
    links = data.links;

    if (selectedNode && !nodes.find(n => n.id === selectedNode.id)) {
      selectedNode = null;
      showEmpty();
      d3.selectAll('.node-group').classed('selected', false);
    }

    // —— 连线 ——
    const linkSel = linkGroup.selectAll('.link-item')
      .data(links, d => d.source.id + '-' + d.target.id);
    linkSel.exit().transition().duration(250).style('opacity', 0).remove();

    const linkEnter = linkSel.enter().append('g')
      .attr('class', 'link-item')
      .style('opacity', 0);
    linkEnter.transition().duration(300).style('opacity', 1);

    linkEnter.append('line')
      .attr('class', 'link-line')
      .attr('stroke', d => d.red ? 'var(--link-red)' : (d.pink ? 'var(--link-pink)' : 'var(--link-line)'))
      .attr('stroke-dasharray', d => (d.red || d.pink) ? '' : '4,4')
      .attr('stroke-width', d => d.red ? 2.2 : (d.pink ? 1.8 : 1.5));

    linkEnter.append('rect')
      .attr('class', 'link-label-bg')
      .attr('width', 60).attr('height', 18).attr('x', -30).attr('y', -9);

    linkEnter.append('text')
      .attr('class', 'link-label-text')
      .attr('dy', 1);

    // —— 节点 ——
    const nodeSel = nodeGroup.selectAll('.node-group')
      .data(nodes, d => d.id);
    nodeSel.exit().transition().duration(250).style('opacity', 0).remove();

    const nodeEnter = nodeSel.enter().append('g')
      .attr('class', 'node-group')
      .style('opacity', 0)
      .call(d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended))
      .on('click', function(e, d) {
        e.stopPropagation();
        selectNode(d);
        // ====== 点击弹射效果 ======
        nodes.forEach(n => {
          if (n !== d) {
            n.vx = (Math.random() - 0.5) * 6;
            n.vy = (Math.random() - 0.5) * 6;
          }
        });
        simulation.alpha(1).restart();
      });

    nodeEnter.transition().duration(350).style('opacity', 1);

    nodeEnter.append('circle').attr('class', 'node-ring').attr('r', 36);
    nodeEnter.append('circle').attr('class', 'node-circle').attr('r', 26);
    nodeEnter.append('text').attr('class', 'node-letter').attr('dy', 1)
      .text(d => d.name ? d.name.charAt(0) : '?');

    const tagW = 44;
    nodeEnter.append('rect')
      .attr('class', 'node-tag-bg')
      .attr('y', -44).attr('height', 16).attr('width', tagW).attr('x', -tagW / 2);
    nodeEnter.append('text').attr('class', 'node-tag-text').attr('y', -36);

    nodeEnter.append('text')
      .attr('class', 'node-name')
      .attr('y', 42)
      .text(d => d.name);

    nodeEnter.append('text')
      .attr('class', 'node-role')
      .attr('y', 56);

    svg.on('click', () => {
      selectedNode = null;
      showEmpty();
      d3.selectAll('.node-group').classed('selected', false);
    });

    refreshVisuals();

    nodes.forEach(d => { d.fx = null; d.fy = null; });
    simulation.nodes(nodes);
    simulation.force('link').links(links);

    // ====== 初始 / 切换时：高 alpha 启动，散花效果 ======
    if (isInit) {
      simulation.alpha(1).restart();
    } else {
      // 切换国家时也以高 alpha 重启，节点会流动到新位置
      simulation.alpha(0.9).restart();
    }
  }

  function refreshVisuals() {
    const all = nodeGroup.selectAll('.node-group');

    all.select('.node-ring')
      .attr('stroke', d => d.color || '#c4bdb5');

    all.select('.node-circle')
      .attr('fill', d => d.color || '#c4bdb5');

    all.select('.node-letter')
      .text(d => d.name ? d.name.charAt(0) : '?');

    all.select('.node-tag-bg')
      .attr('fill', d => d.color || '#c4bdb5')
      .attr('width', d => Math.max(34, ((d.tag || '角色').length * 10 + 12)))
      .attr('x', d => -Math.max(34, ((d.tag || '角色').length * 10 + 12)) / 2);

    all.select('.node-tag-text')
      .text(d => d.tag || '角色');

    all.select('.node-name')
      .text(d => d.name)
      .attr('class', d => d.isMain ? 'node-name main' : 'node-name');

    all.select('.node-role')
      .text(d => (d.role || '').length > 16 ? d.role.slice(0, 14) + '…' : (d.role || ''));
  }

  // ================================================================
  //  物理 tick
  // ================================================================
  simulation.on('tick', () => {
    linkGroup.selectAll('.link-item').each(function(d) {
      const line = d3.select(this).select('line');
      const rect = d3.select(this).select('rect');
      const text = d3.select(this).select('text');
      const x1 = d.source.x, y1 = d.source.y;
      const x2 = d.target.x, y2 = d.target.y;
      line.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const txt = d.relation || '关系';
      const tw = Math.max(40, txt.length * 11 + 14);
      rect.attr('x', mx - tw / 2).attr('y', my - 9).attr('width', tw);
      text.attr('x', mx).attr('y', my).text(txt);
    });
    nodeGroup.selectAll('.node-group')
      .attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ================================================================
  //  拖拽
  // ================================================================
  function dragstarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(e, d) {
    d.fx = e.x; d.fy = e.y;
  }
  function dragended(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = d.x; d.fy = d.y;
  }

  // ================================================================
  //  交互
  // ================================================================
  function switchCountry(country) {
    currentCountry = country;
    document.querySelectorAll('#countryTabs .btn').forEach(b => {
      b.classList.toggle('active', b.dataset.country === country);
    });
    render(country, false);
  }

  document.querySelectorAll('#countryTabs .btn').forEach(btn => {
    btn.addEventListener('click', () => switchCountry(btn.dataset.country));
  });

  function selectNode(d) {
    selectedNode = d;
    d3.selectAll('.node-group').classed('selected', false);
    d3.selectAll('.node-group').filter(n => n === d).classed('selected', true);

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('detail').style.display = 'block';

    document.getElementById('dName').textContent = d.name;
    document.getElementById('dRole').textContent = d.role || '身份未明';
    document.getElementById('dCountry').textContent = '📍 ' + (d.country || '未知');

    document.getElementById('dStory').textContent = d.story || '暂无背景记载。';

    const rels = ALL_LINKS.filter(l => l.source === d.id || l.target === d.id);
    const rc = document.getElementById('dRels');
    if (rels.length === 0) {
      rc.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">暂无关联</div>';
    } else {
      rc.innerHTML = rels.map(l => {
        const other = l.source === d.id ? l.target : l.source;
        const node = ALL_NODES.find(n => n.id === other);
        const color = node ? node.color : '#c4bdb5';
        return `<div class="item"><span class="dot" style="background:${color};"></span> ${other} · ${l.relation}</div>`;
      }).join('');
    }
  }

  function showEmpty() {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }

  function resetZoom() {
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    // 重置时弹射一下，增加活力
    nodes.forEach(n => {
      n.vx = (Math.random() - 0.5) * 4;
      n.vy = (Math.random() - 0.5) * 4;
    });
    simulation.alpha(0.8).restart();
  }
  window.resetZoom = resetZoom;

  // ================================================================
  //  响应式
  // ================================================================
  function resize() {
    width = container.clientWidth;
    height = container.clientHeight || 600;
    svg.attr('viewBox', [-width / 2, -height / 2, width, height]);
    simulation.force('center', d3.forceCenter(0, 0));
    simulation.alpha(0.3).restart();
  }
  window.addEventListener('resize', resize);
  new ResizeObserver(resize).observe(container);

  // ================================================================
  //  启动（带初始化散花动画）
  // ================================================================
  render('业焰之国', true);

  // 延迟选中怀榆，展示面板
  setTimeout(() => {
    const node = ALL_NODES.find(n => n.id === '怀榆');
    if (node) selectNode(node);
  }, 600);

  console.log('🌿 千律州人物星图 · 动态增强版（线长250·阻尼0.3·点击弹射）');
</script>
</body>
</html>
