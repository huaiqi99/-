<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>探索 · 墨境</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    /* ============================================================
       0. 夜间模式兼容
    ============================================================ */
    :root {
      --bg-body: #ffffff;
      --bg-hover: rgba(176, 58, 42, 0.04);
      --text-primary: #2c2c2c;
      --text-secondary: #4a4a4a;
      --text-muted: #8a8a8a;
      --border-light: #ece6de;
      --accent: #b03a2a;
      --accent-soft: rgba(176, 58, 42, 0.08);
    }

    [data-theme="dark"] {
      --bg-body: #1a1816;
      --bg-hover: rgba(176, 90, 74, 0.08);
      --text-primary: #cfc8c0;
      --text-secondary: #9a948c;
      --text-muted: #6a6560;
      --border-light: #35302a;
      --accent: #b05a4a;
      --accent-soft: rgba(176, 90, 74, 0.12);
    }

    /* ============================================================
       1. 全局
    ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.7;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       2. 顶部导航
    ============================================================ */
    #nav {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 24px 10px 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      transition: border-color 0.3s;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links {
      display: flex;
      gap: 18px;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ============================================================
       3. 页头
    ============================================================ */
    #header {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 16px 24px;
      width: 100%;
    }
    #header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    #header .sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ============================================================
       4. 作品列表（无卡片）
    ============================================================ */
    #list {
      max-width: 960px;
      margin: 0 auto;
      padding: 8px 24px 40px 24px;
      width: 100%;
      flex: 1;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid var(--border-light);
      transition: border-color 0.3s, background 0.2s;
      gap: 20px;
    }
    .entry:last-child {
      border-bottom: none;
    }
    .entry:hover {
      background: var(--bg-hover);
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
      border-radius: 6px;
    }

    .entry-info {
      flex: 1;
      min-width: 0;
    }
    .entry-name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }
    .entry-name .highlight {
      color: var(--accent);
    }
    .entry-desc {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .entry-actions a {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      cursor: pointer;
    }
    .entry-actions a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .entry-actions a .icon {
      font-size: 0.75rem;
    }

    /* ============================================================
       5. 底部
    ============================================================ */
    #footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 24px 24px 24px;
      width: 100%;
      border-top: 1px solid var(--border-light);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      transition: border-color 0.3s;
    }

    /* ============================================================
       6. 手机端
    ============================================================ */
    @media (max-width: 768px) {
      #nav {
        padding: 14px 16px 8px 16px;
      }
      .nav-brand { font-size: 1rem; }
      .nav-links a { font-size: 0.85rem; }

      #header {
        padding: 24px 16px 12px 16px;
      }
      #header h1 { font-size: 1.3rem; }
      #header .sub { font-size: 0.85rem; }

      #list {
        padding: 4px 16px 30px 16px;
      }

      .entry {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 14px 0;
      }
      .entry:hover {
        margin: 0 -8px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .entry-name {
        font-size: 0.98rem;
      }
      .entry-desc {
        font-size: 0.82rem;
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .entry-actions {
        gap: 6px;
      }
      .entry-actions a {
        flex: 1;
        justify-content: center;
        padding: 8px 10px;
        font-size: 0.78rem;
      }

      #footer {
        padding: 14px 16px 18px 16px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      #header h1 { font-size: 1.1rem; }
      .entry-name { font-size: 0.92rem; }
      .entry-actions a {
        font-size: 0.72rem;
        padding: 6px 8px;
      }
    }
  </style>
  <script>
    // ============================================================
    //  读取 Butterfly 主题的夜间模式
    // ============================================================
    (function() {
      try {
        var raw = localStorage.getItem('theme');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.value === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (parsed && parsed.value === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      } catch(e) {}
    })();

    window.addEventListener('storage', function(e) {
      if (e.key === 'theme') {
        try {
          var parsed = JSON.parse(e.newValue);
          if (parsed && parsed.value === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (parsed && parsed.value === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch(e) {}
      }
    });

    var observer = new MutationObserver(function() {
      var attr = document.documentElement.getAttribute('data-theme');
    });
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-theme']
    });
  </script>
</head>
<body>

  <nav id="nav">
    <a class="nav-brand" href="/-/">墨境 · <span>探索</span></a>
    <div class="nav-links">
      <a href="/-/">首页</a>
    </div>
  </nav>

  <header id="header">
    <h1>选择一部作品</h1>
    <p class="sub">进入它的世界，查看角色与设定</p>
  </header>

  <main id="list">

    <div class="entry">
      <div class="entry-info">
        <div class="entry-name"><span class="highlight">●</span> 我在地府打工那些年</div>
        <div class="entry-desc">浮生一梦，花开两世，轮回已就，故人当归。</div>
      </div>
      <div class="entry-actions">
        <a href="/-/world/relation/difu/"><span class="icon">✦</span> 星图</a>
        <a href="/-/world/difu/"><span class="icon">◈</span> 世界观</a>
      </div>
    </div>

    <div class="entry">
      <div class="entry-info">
        <div class="entry-name"><span class="highlight">●</span> 这破游戏NPC太能打了</div>
        <div class="entry-desc">此去千秋，有人提灯，渡尽长夜始见光。</div>
      </div>
      <div class="entry-actions">
        <a href="/-/world/relation/npc/"><span class="icon">✦</span> 星图</a>
        <a href="/-/world/npc/"><span class="icon">◈</span> 世界观</a>
      </div>
    </div>

    <div class="entry">
      <div class="entry-info">
        <div class="entry-name"><span class="highlight">●</span> 九州风云录</div>
        <div class="entry-desc">残烛蒙尘，暗室千年，风过旧窗，照见骨里青山。</div>
      </div>
      <div class="entry-actions">
        <a href="/-/world/relation/jiuzhou/"><span class="icon">✦</span> 星图</a>
        <a href="/-/world/jiuzhou/"><span class="icon">◈</span> 世界观</a>
      </div>
    </div>

    <div class="entry">
      <div class="entry-info">
        <div class="entry-name"><span class="highlight">●</span> 北境玫瑰</div>
        <div class="entry-desc">北风剥尽千般相，铁锈缠作骨中霜。来路归途皆不问，只道风雪是寻常。</div>
      </div>
      <div class="entry-actions">
        <a href="/-/world/relation/beijing/"><span class="icon">✦</span> 星图</a>
        <a href="/-/world/beijing/"><span class="icon">◈</span> 世界观</a>
      </div>
    </div>

  </main>

  <footer id="footer">
    更多作品陆续添加中 · 用文字构筑世界
  </footer>

</body>
</html>
