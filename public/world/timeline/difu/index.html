<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间线 · 墨境</title>
  <style>
    /* ============================================================
       0. 夜间模式
    ============================================================ */
    :root {
      --bg-body: #ffffff;
      --text-primary: #2c2c2c;
      --text-secondary: #4a4a4a;
      --text-muted: #8a8a8a;
      --border-light: #ece6de;
      --accent: #b03a2a;
      --accent-soft: rgba(176, 58, 42, 0.06);
      --accent-glow: rgba(176, 58, 42, 0.25);
      --wave-color: #c95a4a;
    }

    [data-theme="dark"] {
      --bg-body: #1a1816;
      --text-primary: #cfc8c0;
      --text-secondary: #9a948c;
      --text-muted: #6a6560;
      --border-light: #35302a;
      --accent: #b05a4a;
      --accent-soft: rgba(176, 90, 74, 0.1);
      --accent-glow: rgba(176, 90, 74, 0.3);
      --wave-color: #d07a6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.8;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #nav {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px 24px 10px 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      transition: border-color 0.3s;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links {
      display: flex;
      gap: 18px;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    #header {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px 20px 24px;
      width: 100%;
    }
    #header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    #header .sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ============================================================
       时间线
    ============================================================ */
    #timeline-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 20px 24px;
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scrollbar-width: thin;
    }
    #timeline-wrap::-webkit-scrollbar { height: 4px; }
    #timeline-wrap::-webkit-scrollbar-track { background: var(--border-light); border-radius: 4px; }
    #timeline-wrap::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    #timeline-track {
      position: relative;
      width: 1600px;
      height: 160px;
      margin: 20px 0 10px 0;
      flex-shrink: 0;
    }

    /* ===== 时间轴（加粗！） ===== */
    .tl-axis {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 5px;
      background: var(--accent);
      transform: translateY(-50%);
      border-radius: 3px;
      opacity: 0.5;
    }

    /* ===== 波浪（纯实线、半透明、泛光） ===== */
    .tl-wave-svg {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 100px;
      transform: translateY(-50%);
      pointer-events: none;
      overflow: visible;
    }
    .tl-wave-svg svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    /* 两条实线波浪，半透明，带泛光 */
    .wave-line {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      filter: drop-shadow(0 0 18px var(--accent-glow));
    }
    .wave-1 {
      stroke: var(--wave-color);
      opacity: 0.3;
    }
    .wave-2 {
      stroke: var(--wave-color);
      opacity: 0.15;
      stroke-width: 2;
    }

    /* ---- 流动动画：波在横轴上左右滑移 ---- */
    @keyframes waveDrift {
      0% { transform: translateX(-20px); }
      100% { transform: translateX(20px); }
    }
    .wave-drift {
      animation: waveDrift 4s ease-in-out infinite alternate;
    }
    .wave-drift-2 {
      animation: waveDrift 5s ease-in-out infinite alternate-reverse;
    }

    /* ===== 节点 ===== */
    .tl-node {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s;
      z-index: 2;
    }
    .tl-node:hover { transform: translate(-50%, -50%) scale(1.12); }

    .tl-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg-body);
      box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(176,58,42,0.2);
      transition: all 0.3s;
    }
    .tl-node.active .tl-dot {
      box-shadow: 0 0 0 5px var(--accent-glow), 0 4px 28px rgba(176,58,42,0.35);
      transform: scale(1.2);
    }

    .tl-label {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.3px;
      transition: color 0.3s;
    }
    .tl-node.active .tl-label {
      color: var(--accent);
      font-weight: 500;
    }

    /* ============================================================
       详情
    ============================================================ */
    #detail {
      max-width: 1000px;
      margin: 0 auto;
      padding: 8px 24px 40px 24px;
      width: 100%;
    }
    #detail-content {
      background: var(--accent-soft);
      border-radius: 8px;
      padding: 24px 28px;
      border-left: 3px solid var(--accent);
      transition: opacity 0.35s ease, transform 0.35s ease;
      min-height: 80px;
    }
    #detail-content .period {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #detail-content .title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    #detail-content .desc {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    /* ============================================================
       底部
    ============================================================ */
    #footer {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px 24px 24px 24px;
      width: 100%;
      border-top: 1px solid var(--border-light);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      transition: border-color 0.3s;
    }

    @media (max-width: 768px) {
      #nav { padding: 14px 16px 8px 16px; }
      .nav-brand { font-size: 1rem; }
      .nav-links a { font-size: 0.85rem; }
      #header { padding: 24px 16px 16px 16px; }
      #header h1 { font-size: 1.3rem; }
      #timeline-wrap { padding: 0 16px 16px 16px; }
      #timeline-track { width: 1400px; height: 130px; }
      .tl-dot { width: 13px; height: 13px; }
      .tl-label { font-size: 0.7rem; margin-top: 12px; }
      #detail { padding: 4px 16px 30px 16px; }
      #detail-content { padding: 18px 16px; min-height: 60px; }
      #detail-content .title { font-size: 1rem; }
      #detail-content .desc { font-size: 0.85rem; }
      #footer { padding: 14px 16px 18px 16px; font-size: 0.75rem; }
    }

    @media (max-width: 480px) {
      #header h1 { font-size: 1.1rem; }
      #timeline-track { width: 1200px; height: 110px; }
      .tl-dot { width: 11px; height: 11px; }
      .tl-label { font-size: 0.6rem; margin-top: 10px; }
    }
  </style>

  <script>
    (function() {
      try {
        var raw = localStorage.getItem('theme');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.value === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (parsed && parsed.value === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      } catch(e) {}
    })();
    window.addEventListener('storage', function(e) {
      if (e.key === 'theme') {
        try {
          var parsed = JSON.parse(e.newValue);
          if (parsed && parsed.value === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (parsed && parsed.value === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch(e) {}
      }
    });
  </script>
</head>
<body>

  <nav id="nav">
    <a class="nav-brand" href="/-/">墨境 · <span>年表</span></a>
    <div class="nav-links">
      <a href="/-/">首页</a>
      <a href="/-/world/">探索</a>
    </div>
  </nav>

  <header id="header">
    <h1>时间线</h1>
    <p class="sub">点击节点查看事件详情 · 滑动浏览</p>
  </header>

  <div id="timeline-wrap">
    <div id="timeline-track">

      <!-- 时间轴：加粗到 5px -->
      <div class="tl-axis"></div>

      <!-- 波浪层 -->
      <div class="tl-wave-svg">
        <svg viewBox="0 0 1600 100" preserveAspectRatio="none">
          <!-- 波浪1：实线，半透明，流动 -->
          <path class="wave-line wave-1 wave-drift"
                d="M0,50 C120,20 260,80 400,50 C540,20 680,80 820,50 C960,20 1100,80 1240,50 C1380,20 1520,80 1600,50" />
          <!-- 波浪2：实线，更淡，反向流动 -->
          <path class="wave-line wave-2 wave-drift-2"
                d="M0,50 C120,80 260,20 400,50 C540,80 680,20 820,50 C960,80 1100,20 1240,50 C1380,80 1520,20 1600,50" />
        </svg>
      </div>

      <!-- 节点 -->
      <div class="tl-node active" data-index="0" style="left:0%;">
        <div class="tl-dot"></div>
        <span class="tl-label">第一纪元</span>
      </div>
      <div class="tl-node" data-index="1" style="left:25%;">
        <div class="tl-dot"></div>
        <span class="tl-label">第二纪元·七神</span>
      </div>
      <div class="tl-node" data-index="2" style="left:50%;">
        <div class="tl-dot"></div>
        <span class="tl-label">大寂灭</span>
      </div>
      <div class="tl-node" data-index="3" style="left:75%;">
        <div class="tl-dot"></div>
        <span class="tl-label">第三纪元·当代</span>
      </div>
      <div class="tl-node" data-index="4" style="left:100%;">
        <div class="tl-dot"></div>
        <span class="tl-label">永昼净土</span>
      </div>

    </div>
  </div>

  <div id="detail">
    <div id="detail-content">
      <div class="period" id="detail-period">第一纪元</div>
      <div class="title" id="detail-title">原初三神</div>
      <div class="desc" id="detail-desc">天地初开，海洋（尘歌）、天空、陆地三位精灵诞生。三神同阶，共存万年以上。</div>
    </div>
  </div>

  <footer id="footer">
    ©2026 淮子生生 · 用文字构筑世界
  </footer>

  <script>
    (function() {
      var data = [
        { period: '第一纪元', title: '原初三神', desc: '天地初开，海洋（尘歌）、天空、陆地三位精灵诞生。三神同阶，共存万年以上，世界在此奠基。' },
        { period: '第二纪元', title: '七神之座', desc: '天空与陆地精灵在天地磨损中陨落，其权柄分裂为六份——时间、空间、光明、火焰、草木、冰雷，与尘歌共同构成七神之座。' },
        { period: '第二纪元·末', title: '大寂灭', desc: '神战爆发，火雨、冰封、时空错乱席卷千律州。文明近乎断绝，七神仅尘歌幸存，其余尽数陨落。' },
        { period: '第三纪元', title: '伪神时代', desc: '尘歌沉睡后苏醒，抹除大寂灭的历史，以旧神权柄碎片创造当代伪神。封锁修炼之法，世界进入表面平稳的暗流中。' },
        { period: '终章', title: '永昼净土', desc: '尘歌陨落后，怀榆继承全部权柄，成为新一代的伪创世神。世界在永昼净土迎来新的可能——或新的循环。' }
      ];

      var nodes = document.querySelectorAll('.tl-node');
      var detailPeriod = document.getElementById('detail-period');
      var detailTitle = document.getElementById('detail-title');
      var detailDesc = document.getElementById('detail-desc');

      function selectNode(index) {
        nodes.forEach(function(el) { el.classList.remove('active'); });
        nodes[index].classList.add('active');

        var container = document.getElementById('detail-content');
        container.style.opacity = '0';
        container.style.transform = 'translateY(6px)';

        setTimeout(function() {
          detailPeriod.textContent = data[index].period;
          detailTitle.textContent = data[index].title;
          detailDesc.textContent = data[index].desc;
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
        }, 180);
      }

      nodes.forEach(function(node) {
        node.addEventListener('click', function(e) {
          var idx = parseInt(this.getAttribute('data-index'), 10);
          selectNode(idx);
        });
      });

      selectNode(0);
    })();
  </script>

</body>
</html>
