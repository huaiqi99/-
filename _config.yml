# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 墨境
subtitle: 用文字构筑世界
description: 一个关于奇幻、仙侠与情感的小说世界
keywords: 小说, 原创, 奇幻, 仙侠, GB
author: 淮子生生
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://huaiqi99.github.io/-
root: /-
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: mtime

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# =====================================
# 文章密码加密插件 - 按分类整本书上锁
# =====================================
encrypt:
  enable: true
  default_abstract: '🔒 站住！李姐允许你看了吗你就点'
  default_message: '请输入密码：'
  default_template: |
    <div style="text-align:center; padding: 50px 20px; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); border-radius: 12px; margin: 30px 0;">
      <h2 style="color: #f7f5f0; margin-bottom: 10px;">🔒 站住！</h2>
      <p style="color: #8a8580; font-size: 0.95em; margin-bottom: 25px;">{{message}}</p>
      <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <input type="password" name="password" placeholder="输入密码..." style="padding: 12px 18px; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; color: #f7f5f0; font-size: 1em; width: 200px;">
        <input type="submit" value="🔓 进入" style="padding: 12px 24px; background: #c44536; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em;">
      </div>
    </div>
  default_wrong_template: |
    <div style="text-align:center; padding: 20px; color: #c44536;">
      <p>❌ 你没有得到李姐的许可！</p>
    </div>
  default_decryption_failure_template: |
    <div style="text-align:center; padding: 20px; color: #c44536;">
      <p>❌ 解密失败，文章可能已损坏</p>
    </div>
  categories:
    - name: 我在地府打工那些年
